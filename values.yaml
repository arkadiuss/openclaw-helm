# OpenClaw Helm Chart - Default Values

replicaCount: 1

image:
  repository: ghcr.io/openclaw/openclaw
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 18789

# Gateway API HTTPRoute configuration
gateway:
  enabled: false
  # Parent gateway reference
  parentRef:
    name: ""
    namespace: ""
  hostname: ""

# Network policy
networkPolicy:
  enabled: false
  # Additional egress rules beyond DNS and HTTPS
  additionalEgress: []

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe: {}
  # httpGet:
  #   path: /readyz
  #   port: http
  # initialDelaySeconds: 10
  # periodSeconds: 10
  # timeoutSeconds: 5
  # failureThreshold: 3

resources: {}

# Persistence for OpenClaw data (~/.openclaw)
persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClassName: ""
  # Bind to a specific PersistentVolume
  volumeName: ""

# OpenClaw configuration
openclaw:
  # Reference to an existing secret containing the LLM API key
  apiKeySecret: ""
  apiKeySecretKey: "api-key"
  # Environment variable name for the API key (e.g. ANTHROPIC_API_KEY, OPENAI_API_KEY)
  apiKeyEnvVar: "ANTHROPIC_API_KEY"
  # Default model (e.g. claude-sonnet-4-6, claude-opus-4-6)
  defaultModel: ""
  # Reference to an existing secret containing the gateway token
  gatewayTokenSecret: ""
  gatewayTokenSecretKey: "gateway-token"
  # Allowed origins for the control UI (e.g. ["https://openclaw.example.com"])
  controlUiAllowedOrigins: []
  # Extra environment variables
  env: []

# Rootless Podman sidecar for sandbox support
# Requires Kubernetes User Namespaces (hostUsers: false, K8s >= 1.33, containerd >= 2.0, kernel >= 6.3)
podman:
  enabled: false
  image:
    repository: quay.io/podman/stable
    tag: "latest"
    pullPolicy: IfNotPresent
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: Unconfined
    capabilities:
      add:
        - SYS_ADMIN
        - SETUID
        - SETGID
      drop:
        - ALL
  resources: {}
  # Size limit for ephemeral container/image storage
  storageSize: 10Gi

# Additional volumes
volumes: []
# Additional volume mounts for the openclaw container
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
