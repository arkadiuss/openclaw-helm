apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "openclaw.fullname" . }}
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "openclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-scripts.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openclaw.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openclaw.serviceAccountName" . }}
      {{- if .Values.podman.enabled }}
      hostUsers: false
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      initContainers:
        - name: init-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/config/init.sh"]
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- if .Values.openclaw.gatewayTokenSecret }}
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openclaw.gatewayTokenSecret }}
                  key: {{ .Values.openclaw.gatewayTokenSecretKey }}
            {{- end }}
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
              readOnly: true
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["openclaw"]
          args: ["gateway", "--allow-unconfigured"]
          ports:
            - name: http
              containerPort: 18789
              protocol: TCP
          env:
            {{- if .Values.podman.enabled }}
            - name: OPENCLAW_SANDBOX
              value: "1"
            - name: OPENCLAW_DOCKER_SOCKET
              value: /run/podman/podman.sock
            {{- end }}
            {{- if .Values.openclaw.defaultModel }}
            - name: OPENCLAW_MODEL
              value: {{ .Values.openclaw.defaultModel | quote }}
            {{- end }}
            {{- if .Values.openclaw.apiKeySecret }}
            - name: {{ .Values.openclaw.apiKeyEnvVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openclaw.apiKeySecret }}
                  key: {{ .Values.openclaw.apiKeySecretKey }}
            {{- end }}
            {{- if .Values.openclaw.gatewayTokenSecret }}
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openclaw.gatewayTokenSecret }}
                  key: {{ .Values.openclaw.gatewayTokenSecretKey }}
            {{- end }}
            {{- with .Values.openclaw.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            {{- if .Values.podman.enabled }}
            - name: podman-socket
              mountPath: /run/podman
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if .Values.podman.enabled }}
        - name: podman
          image: "{{ .Values.podman.image.repository }}:{{ .Values.podman.image.tag }}"
          imagePullPolicy: {{ .Values.podman.image.pullPolicy }}
          command: ["/config/podman-entrypoint.sh"]
          {{- with .Values.podman.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.podman.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: podman-socket
              mountPath: /run/podman
            - name: podman-storage
              mountPath: /home/podman/.local/share/containers
            - name: config
              mountPath: /config
              readOnly: true
        {{- end }}
        {{- if .Values.browser.enabled }}
        - name: browser
          image: "{{ .Values.browser.image.repository }}:{{ .Values.browser.image.tag }}"
          imagePullPolicy: {{ .Values.browser.image.pullPolicy }}
          args:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-port=9222
          {{- with .Values.browser.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.browser.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: browser-shm
              mountPath: /dev/shm
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "openclaw.fullname" . }}-config
            defaultMode: 0755
        {{- if .Values.podman.enabled }}
        - name: podman-socket
          emptyDir: {}
        - name: podman-storage
          emptyDir:
            sizeLimit: {{ .Values.podman.storageSize }}
        {{- end }}
        {{- if .Values.browser.enabled }}
        - name: browser-shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.browser.shmSize }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    {{- if .Values.persistence.enabled }}
    - metadata:
        name: openclaw-data
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName }}
        {{- end }}
        {{- if .Values.persistence.volumeName }}
        volumeName: {{ .Values.persistence.volumeName }}
        {{- end }}
    {{- end }}
